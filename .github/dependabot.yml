version: 2
updates:
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
      semver-major-days: 28
  - package-ecosystem: npm
    directory: '/wasm_test'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
      semver-major-days: 28
    open-pull-requests-limit: 10
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
